spring.application.name=pekalab
server.port=9090

# 1. CONEXIËN A SUPABASE
spring.datasource.url=jdbc:postgresql://db.ptninhdvjbbkkperkwco.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=RichardSamillan@
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA / HIBERNATE (Ajustado para PostGIS)
# Cambiamos el dialecto al de SPATIAL para que Java entienda las coordenadas de Supabase
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. SOPORTE PARA EXCEL (Multipart)
# Esto es vital para que Pekalab acepte el archivo de los 200 motorizados
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB